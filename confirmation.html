<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva Confirmada - <span class="b-name">Lumina</span></title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

  <!-- Navbar -->
  <nav class="navbar" style="position: relative;">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <div class="navbar__logo-icon">✨</div>
        <span class="b-name">Lumina</span>
      </a>
      <div class="navbar__actions">
        <button id="theme-toggle" class="navbar__toggle-theme" aria-label="Cambiar tema">🌙</button>
      </div>
    </div>
  </nav>

  <main class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding-block: var(--space-12);">
    
    <div class="card card-glass text-center animate-scale-in" style="max-width: 500px; width: 100%; padding: var(--space-10) var(--space-8);">
      
      <!-- Success Animation / Icon -->
      <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--success-bg); color: var(--success); display: grid; place-items: center; font-size: 40px; margin: 0 auto var(--space-6); border: 2px solid var(--success);">
        ✓
      </div>
      
      <h1 style="margin-bottom: var(--space-2);">¡Reserva Confirmada!</h1>
      <p style="margin-bottom: var(--space-6);">Hemos enviado los detalles a tu correo electrónico.</p>
      
      <!-- Booking Details Block -->
      <div style="background: var(--bg-input); border: 1px solid var(--border-default); border-radius: var(--radius-xl); padding: var(--space-5); text-align: left; margin-bottom: var(--space-8);">
        <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-4); padding-bottom: var(--space-3); border-bottom: 1px solid var(--border-subtle);">
          <span class="text-muted text-sm">Código de Reserva</span>
          <strong id="conf-id" style="font-family: 'Outfit', sans-serif;">Cargando...</strong>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: var(--space-3);">
          <div style="display: flex; gap: var(--space-3);">
            <span style="font-size: var(--text-lg); width: 24px;">✨</span>
            <div>
              <div class="text-xs text-muted text-uppercase" style="font-weight: 600;">Servicio</div>
              <div id="conf-service" style="font-weight: 500;">...</div>
            </div>
          </div>
          
          <div style="display: flex; gap: var(--space-3);">
            <span style="font-size: var(--text-lg); width: 24px;">📅</span>
            <div>
              <div class="text-xs text-muted text-uppercase" style="font-weight: 600;">Fecha y Hora</div>
              <div id="conf-datetime" style="font-weight: 500;">...</div>
            </div>
          </div>
          
          <div style="display: flex; gap: var(--space-3);">
            <span style="font-size: var(--text-lg); width: 24px;">📍</span>
            <div>
              <div class="text-xs text-muted text-uppercase" style="font-weight: 600;">Ubicación</div>
              <div id="conf-address" style="font-weight: 500;">...</div>
            </div>
          </div>
        </div>
      </div>
      
      <div style="display: flex; flex-direction: column; gap: var(--space-3);">
        <button class="btn btn-primary w-full" id="btn-calendar">
          <span style="font-size: 18px;">📅</span> Agregar al Calendario
        </button>
        <button class="btn btn-secondary w-full" id="btn-whatsapp">
          <span style="font-size: 18px; color: #25d366;">💬</span> Compartir por WhatsApp
        </button>
        <a href="index.html" class="btn btn-ghost w-full" style="margin-top: var(--space-2);">Volver al inicio</a>
      </div>
      
    </div>

  </main>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const bookingId = localStorage.getItem('lastBookingId');
      if (!bookingId) {
        window.location.href = 'index.html'; // No recent booking
        return;
      }
      
      const bookings = window.MockDB.getBookings();
      const booking = bookings.find(b => b.id === bookingId);
      
      if (!booking) return;
      
      const srv = BUSINESS_CONFIG.services.find(s => s.id === booking.serviceId);
      
      document.getElementById('conf-id').textContent = booking.id;
      document.getElementById('conf-service').textContent = srv ? srv.name : 'Servicio Desconocido';
      document.getElementById('conf-address').textContent = BUSINESS_CONFIG.contact.address;
      
      // Format Date
      const dOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      // Fixing timezone for correct display
      const [year, month, day] = booking.date.split('-');
      const bDate = new Date(year, month - 1, day);
      
      const dStr = bDate.toLocaleDateString(BUSINESS_CONFIG.locale, dOptions);
      document.getElementById('conf-datetime').textContent = `${dStr} a las ${booking.time}`;
      
      // WhatsApp Action
      document.getElementById('btn-whatsapp').addEventListener('click', () => {
        const text = `¡Hola! He reservado una cita en ${BUSINESS_CONFIG.name}.\n\n📅 Fecha: ${dStr} a las ${booking.time}\n✨ Servicio: ${srv.name}\n🔖 Código: ${booking.id}\n\n¡Nos vemos pronto!`;
        const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
      });
      
      // ICS Action
      document.getElementById('btn-calendar').addEventListener('click', () => {
        // Very basic ICS generator
        const pad = (n) => (n < 10 ? '0' + n : n);
        
        const dateParts = booking.date.split('-'); // YYYY-MM-DD
        const timeParts = booking.time.split(':'); // HH:MM
        
        const start = new Date(dateParts[0], dateParts[1] - 1, dateParts[2], timeParts[0], timeParts[1]);
        const end = new Date(start.getTime() + (srv ? srv.duration : 30) * 60000);
        
        const formatICSDate = (d) => {
          return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
        };
        
        const icsContent = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'BEGIN:VEVENT',
          `DTSTART:${formatICSDate(start)}`,
          `DTEND:${formatICSDate(end)}`,
          `SUMMARY:Cita en ${BUSINESS_CONFIG.name} - ${srv ? srv.name : ''}`,
          `DESCRIPTION:Reserva ID: ${booking.id}`,
          `LOCATION:${BUSINESS_CONFIG.contact.address}`,
          'END:VEVENT',
          'END:VCALENDAR'
        ].join('\n');
        
        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.download = `Reserva_${booking.id}.ics`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
      
    });
  </script>
</body>
</html>
